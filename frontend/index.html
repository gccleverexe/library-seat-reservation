<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园图书馆座位预约系统</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
        .loading { text-align: center; color: #666; }
        h1 { color: #1976d2; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="loading">
        <h1>📚 校园图书馆座位预约系统</h1>
        <p>正在跳转...</p>
    </div>
    <script>
        (function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/pages/login.html';
                return;
            }
            const user = JSON.parse(localStorage.getItem('user_info') || '{}');
            if (user.role === 'admin') {
                window.location.href = '/pages/admin.html';
            } else {
                window.location.href = '/pages/seats.html';
            }
        })();
    </script>
</body>
</html>
